<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
    <h2>Регистрация</h2>
    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
    <form method="post" >
        <input type="text" name="username" placeholder="Имя пользователя" required><br>
        <input type="name" id="name" name="name" placeholder="имя" required><br>
        <input type="surname" id="surname" name="surname" placeholder="фамилия" required><br>
        <input type="login" id="login" name="login" placeholder="Логин" required><br>
        <input type="email" id="email" name="email" placeholder="email" required><br>
        <input type="role" id="role" name="role" placeholder="роль" required><br>
        <input type="password" id="password" name="password" placeholder="Пароль" required><br>
        <input type="datebirth" id="datebirth" name="datebirth" placeholder="дата" required><br>

        <button type="submit">Зарегистрировать</button>
    </form>
    <button onclick="toggleTheme()">Сменить тему</button>
</div>
<script>
function toggleTheme() {
    document.body.classList.toggle("dark");
}
</script>
</body>
</html>
