{%extends 'base.html'%}

{%title%} Личный кабинет {%endtitle%}

{%body%}
    <div class="container">
        <label for="name">Имя</label>
        <input type="name" id="name" name="name" placeholder="имя" required><br>
    </div>

    <div class="container">
        <label for="surname">фамилия</label>
        <input type="surname" id="surname" name="surname" placeholder="фамилия" required><br>
    </div>

    <div class="container">
        <label for="login">login</label>
        <input type="login" id="login" name="login" placeholder="Логин" required><br>
    </div>
    
    <div class="container">
        <label for="email">email</label>
        <input type="email" id="email" name="email" placeholder="email" required><br>
    </div>

    <div class="container">
        <label for="role">роль</label>
        <input type="role" id="role" name="role" placeholder="роль" required><br>
    </div> 

    <div class="container">       
        <label for="password">password</label>
        <input type="password" id="password" name="password" placeholder="Пароль" required><br>
    </div>
{%endbody%}
